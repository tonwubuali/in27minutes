<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <link rel="apple-touch-icon" href="/favicon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <meta name="theme-color" content="#0F1B33" />
    <title>in27minutes — anything across MOUAU in 27 minutes</title>

    <script src="https://cdn.tailwindcss.com"></script>
    <script>
      tailwind.config = {
        theme: {
          extend: {
            colors: {
              brand: {
                ink: "#0F1B33",
                ink2: "#172544",
                orange: "#F26419",
                orangeDark: "#D6500C",
                cloud: "#F7F8FB",
                line: "#ECEFF4",
              },
            },
            fontFamily: { sans: ["Inter", "system-ui", "Segoe UI", "sans-serif"] },
            letterSpacing: { tightest: "-0.03em" },
            boxShadow: {
              soft: "0 1px 2px rgba(15,27,51,.04), 0 4px 16px -8px rgba(15,27,51,.10)",
              card: "0 2px 6px -2px rgba(15,27,51,.08), 0 12px 28px -12px rgba(15,27,51,.14)",
              lift: "0 10px 22px -8px rgba(15,27,51,.22)",
              float: "0 18px 40px -16px rgba(15,27,51,.30)",
              pop: "0 8px 24px -6px rgba(242,100,25,.45)",
            },
            keyframes: {
              "fade-in": { "0%": { opacity: 0 }, "100%": { opacity: 1 } },
              "fade-up": { "0%": { opacity: 0, transform: "translateY(14px)" }, "100%": { opacity: 1, transform: "translateY(0)" } },
              "fade-down": { "0%": { opacity: 0, transform: "translateY(-10px)" }, "100%": { opacity: 1, transform: "translateY(0)" } },
              "scale-in": { "0%": { opacity: 0, transform: "scale(.96)" }, "100%": { opacity: 1, transform: "scale(1)" } },
              "sheet-up": { "0%": { opacity: 0, transform: "translateY(40px) scale(.98)" }, "100%": { opacity: 1, transform: "translateY(0) scale(1)" } },
              pop: { "0%": { transform: "scale(1)" }, "40%": { transform: "scale(1.22)" }, "100%": { transform: "scale(1)" } },
              float: { "0%,100%": { transform: "translateY(0)" }, "50%": { transform: "translateY(-7px)" } },
              shimmer: { "0%": { backgroundPosition: "-468px 0" }, "100%": { backgroundPosition: "468px 0" } },
              "spin-slow": { to: { transform: "rotate(360deg)" } },
              "bob": { "0%,100%": { transform: "translateY(0) rotate(-4deg)" }, "50%": { transform: "translateY(-2px) rotate(4deg)" } },
            },
            animation: {
              "fade-in": "fade-in .5s ease both",
              "fade-up": "fade-up .55s cubic-bezier(.22,1,.36,1) both",
              "fade-down": "fade-down .4s cubic-bezier(.22,1,.36,1) both",
              "scale-in": "scale-in .42s cubic-bezier(.34,1.56,.64,1) both",
              "sheet-up": "sheet-up .42s cubic-bezier(.22,1,.36,1) both",
              pop: "pop .35s cubic-bezier(.34,1.56,.64,1)",
              float: "float 4s ease-in-out infinite",
              "spin-slow": "spin-slow 9s linear infinite",
              bob: "bob 1.6s ease-in-out infinite",
            },
          },
        },
      };
    </script>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap" rel="stylesheet" />
    <style>
      html { scroll-behavior: smooth; -webkit-text-size-adjust: 100%; }
      body { font-family: "Inter", system-ui, sans-serif; -webkit-font-smoothing: antialiased; text-rendering: optimizeLegibility; }
      h1, h2, h3 { letter-spacing: -0.02em; }
      ::selection { background: #F26419; color: #fff; }
      ::-webkit-scrollbar { width: 10px; height: 10px; }
      ::-webkit-scrollbar-thumb { background: #d4dce8; border-radius: 999px; }
      ::-webkit-scrollbar-thumb:hover { background: #bcc8da; }
      .stagger > * { animation: fade-up .5s cubic-bezier(.22,1,.36,1) both; animation-delay: calc(var(--i, 0) * 45ms); }
      .skeleton { background: linear-gradient(90deg,#eef2f7 25%,#e3e9f1 37%,#eef2f7 63%); background-size: 800px 100%; animation: shimmer 1.4s infinite linear; }
      .press { transition: transform .14s cubic-bezier(.34,1.56,.64,1), box-shadow .2s ease, background-color .2s ease; }
      .press:active { transform: scale(.95); }
      .lift { transition: transform .28s cubic-bezier(.22,1,.36,1), box-shadow .28s ease; }
      .lift:hover { transform: translateY(-3px); }
      .glass { background: rgba(255,255,255,.72); backdrop-filter: saturate(180%) blur(14px); -webkit-backdrop-filter: saturate(180%) blur(14px); }
      .safe-b { padding-bottom: calc(env(safe-area-inset-bottom, 0px)); }
      .no-scrollbar::-webkit-scrollbar { display: none; }
      .no-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }
      @media (prefers-reduced-motion: reduce) {
        *, *::before, *::after { animation-duration: .001ms !important; animation-iteration-count: 1 !important; transition-duration: .001ms !important; scroll-behavior: auto !important; }
      }
    </style>
  </head>
  <body class="bg-brand-cloud text-brand-ink">
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
