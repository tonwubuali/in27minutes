<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/png" href="/logo.png" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>in27minutes — anything, delivered in 27 minutes</title>

    <!-- Tailwind Play CDN: zero build config, brand palette wired in below. -->
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
      tailwind.config = {
        theme: {
          extend: {
            colors: {
              brand: {
                ink: "#0F1B33",     // deep navy from the logo
                orange: "#F26419",   // signal orange
                orangeDark: "#D6500C",
                cloud: "#F6F8FB",    // app background
                line: "#E6EBF2",
              },
            },
            fontFamily: {
              sans: ["Inter", "system-ui", "Segoe UI", "Roboto", "sans-serif"],
            },
          },
        },
      };
    </script>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap"
      rel="stylesheet"
    />
    <style>
      body { font-family: "Inter", system-ui, sans-serif; }
      /* thin scrollbars so dashboards feel app-like */
      ::-webkit-scrollbar { width: 10px; height: 10px; }
      ::-webkit-scrollbar-thumb { background: #cdd6e4; border-radius: 999px; }
    </style>
  </head>
  <body class="bg-brand-cloud text-brand-ink">
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
