<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <link rel="apple-touch-icon" href="/favicon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>in27minutes — anything across MOUAU in 27 minutes</title>

    <script src="https://cdn.tailwindcss.com"></script>
    <script>
      tailwind.config = {
        theme: {
          extend: {
            colors: {
              brand: {
                ink: "#0F1B33",
                ink2: "#172544",
                orange: "#F26419",
                orangeDark: "#D6500C",
                cloud: "#F6F8FB",
                line: "#E6EBF2",
              },
            },
            fontFamily: { sans: ["Inter", "system-ui", "Segoe UI", "sans-serif"] },
            keyframes: {
              "fade-in": { "0%": { opacity: 0 }, "100%": { opacity: 1 } },
              "fade-up": {
                "0%": { opacity: 0, transform: "translateY(14px)" },
                "100%": { opacity: 1, transform: "translateY(0)" },
              },
              "fade-down": {
                "0%": { opacity: 0, transform: "translateY(-10px)" },
                "100%": { opacity: 1, transform: "translateY(0)" },
              },
              "scale-in": {
                "0%": { opacity: 0, transform: "scale(.94)" },
                "100%": { opacity: 1, transform: "scale(1)" },
              },
              pop: {
                "0%": { transform: "scale(1)" },
                "40%": { transform: "scale(1.18)" },
                "100%": { transform: "scale(1)" },
              },
              float: {
                "0%,100%": { transform: "translateY(0)" },
                "50%": { transform: "translateY(-7px)" },
              },
              shimmer: {
                "0%": { backgroundPosition: "-468px 0" },
                "100%": { backgroundPosition: "468px 0" },
              },
              "slide-in-right": {
                "0%": { opacity: 0, transform: "translateX(28px)" },
                "100%": { opacity: 1, transform: "translateX(0)" },
              },
              "dash": { to: { "stroke-dashoffset": 0 } },
              "spin-slow": { to: { transform: "rotate(360deg)" } },
              "pulse-ring": {
                "0%": { transform: "scale(.8)", opacity: 0.7 },
                "100%": { transform: "scale(2.2)", opacity: 0 },
              },
            },
            animation: {
              "fade-in": "fade-in .5s ease both",
              "fade-up": "fade-up .55s cubic-bezier(.22,1,.36,1) both",
              "fade-down": "fade-down .4s ease both",
              "scale-in": "scale-in .4s cubic-bezier(.22,1,.36,1) both",
              pop: "pop .35s ease",
              float: "float 4s ease-in-out infinite",
              "slide-in-right": "slide-in-right .45s cubic-bezier(.22,1,.36,1) both",
              "spin-slow": "spin-slow 9s linear infinite",
              "pulse-ring": "pulse-ring 1.6s cubic-bezier(.2,.6,.4,1) infinite",
            },
          },
        },
      };
    </script>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap"
      rel="stylesheet"
    />
    <style>
      html { scroll-behavior: smooth; }
      body { font-family: "Inter", system-ui, sans-serif; -webkit-font-smoothing: antialiased; }
      ::-webkit-scrollbar { width: 10px; height: 10px; }
      ::-webkit-scrollbar-thumb { background: #cdd6e4; border-radius: 999px; }
      ::-webkit-scrollbar-thumb:hover { background: #b6c2d6; }
      /* staggered list entrance: set --i on items */
      .stagger > * { animation: fade-up .5s cubic-bezier(.22,1,.36,1) both; animation-delay: calc(var(--i, 0) * 45ms); }
      .skeleton {
        background: linear-gradient(90deg,#eef2f7 25%,#e2e8f1 37%,#eef2f7 63%);
        background-size: 800px 100%;
        animation: shimmer 1.4s infinite linear;
      }
      .press { transition: transform .12s ease, box-shadow .2s ease; }
      .press:active { transform: scale(.96); }
      .lift { transition: transform .25s cubic-bezier(.22,1,.36,1), box-shadow .25s ease; }
      .lift:hover { transform: translateY(-4px); box-shadow: 0 18px 40px -18px rgba(15,27,51,.35); }
      @media (prefers-reduced-motion: reduce) {
        *, *::before, *::after { animation-duration: .001ms !important; animation-iteration-count: 1 !important; transition-duration: .001ms !important; scroll-behavior: auto !important; }
      }
    </style>
  </head>
  <body class="bg-brand-cloud text-brand-ink">
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
